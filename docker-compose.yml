version: "3.8"
services:
  backend:
    build: ./backend
    container_name: dpr-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: dpr-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped